name: SLEIPNIR CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx next build

      - name: Test
        run: npx vitest run
        continue-on-error: true
